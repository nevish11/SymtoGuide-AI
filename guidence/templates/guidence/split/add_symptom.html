{% extends "guidence/split/user_base.html" %}
{% block content %}

<div class="container-fluid mt-4">
  <div class="row justify-content-center">
    <div class="col-xl-8 col-lg-9">
      <div class="card shadow-sm border-0">

        <div class="card-header bg-info border-bottom text-white">
          <h4 class="mb-1">Add Symptoms</h4>
          <p class="mb-0">Share how you are feeling so SymptoGuide AI can assist you</p>
        </div>

        <div class="card-body">
          <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
              <label class="form-label fw-semibold">Symptom</label>
              <input type="text" name="symptom_name" class="form-control" 
                     placeholder="e.g. Sharp headache"
                     value="{{ symptom.symptom_name|default:'' }}" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Affected Body Part</label>
              <select name="body_part" class="form-select" required>
                <option value="">Select body part</option>
                <option value="head" {% if symptom.body_part == "head" %}selected{% endif %}>Head</option>
                <option value="eyes" {% if symptom.body_part == "eyes" %}selected{% endif %}>Eyes</option>
                <option value="ears" {% if symptom.body_part == "ears" %}selected{% endif %}>Ears</option>
                <option value="nose" {% if symptom.body_part == "nose" %}selected{% endif %}>Nose</option>
                <option value="mouth" {% if symptom.body_part == "mouth" %}selected{% endif %}>Mouth / Throat</option>
                <option value="chest" {% if symptom.body_part == "chest" %}selected{% endif %}>Chest</option>
                <option value="abdomen" {% if symptom.body_part == "abdomen" %}selected{% endif %}>Abdomen</option>
                <option value="back" {% if symptom.body_part == "back" %}selected{% endif %}>Back</option>
                <option value="arms" {% if symptom.body_part == "arms" %}selected{% endif %}>Arms / Hands</option>
                <option value="legs" {% if symptom.body_part == "legs" %}selected{% endif %}>Legs / Feet</option>
                <option value="skin" {% if symptom.body_part == "skin" %}selected{% endif %}>Skin</option>
                <option value="urinary" {% if symptom.body_part == "urinary" %}selected{% endif %}>Urinary</option>
                <option value="general" {% if symptom.body_part == "general" %}selected{% endif %}>General</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Severity</label>
              <select name="severity" class="form-select" required>
                <option value="">Select severity</option>
                <option value="1" {% if symptom.severity == 1 %}selected{% endif %}>Mild</option>
                <option value="2" {% if symptom.severity == 2 %}selected{% endif %}>Moderate</option>
                <option value="3" {% if symptom.severity == 3 %}selected{% endif %}>Severe</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Duration</label>
              <select name="duration" class="form-select" required>
                <option value="">Select duration</option>
                <option value="hours" {% if symptom.duration == "hours" %}selected{% endif %}>Hours (Less than 24 hours)</option>
                <option value="days" {% if symptom.duration == "days" %}selected{% endif %}>Days (1–7 days)</option>
                <option value="weeks" {% if symptom.duration == "weeks" %}selected{% endif %}>Weeks (1–4 weeks)</option>
                <option value="months" {% if symptom.duration == "months" %}selected{% endif %}>Months (More than 1 month)</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Symptom Start Time</label>
              <input type="datetime-local" name="started_when" 
                     value="{{ symptom.started_when|date:'Y-m-d\TH:i' }}" 
                     class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Additional Details (Optional)</label>
              <textarea name="description" class="form-control" rows="3" 
                        placeholder="Tell us more about the pain...">{{ symptom.description|default:'' }}</textarea>
            </div>

            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary btn-lg">
                {% if symptom %}Update Symptom{% else %}Save & Analyze with AI{% endif %}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
